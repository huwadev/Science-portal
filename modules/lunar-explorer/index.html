<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Explorer | ESSS Science Portal</title>
    <meta name="description" content="Explore the Moon in 3D with deep-zoom NASA satellite tiles.">
    <link rel="icon" href="../../esss-badge.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CesiumJS library -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-container">
        <header class="module-header">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <a href="../../index.html" class="back-btn" id="ui-back-btn" aria-label="Back to Portal">&larr; Back to Portal</a>
                <button id="lang-toggle" class="glass-btn" style="padding: 5px 15px; border-radius: 20px; cursor: pointer; font-family: 'Outfit'; font-weight: 600; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; transition: all 0.3s ease;">EN / አማርኛ</button>
            </div>
            <h1 id="ui-app-title">Lunar Explorer</h1>
            <p class="subtitle" id="ui-app-subtitle">Deep Zoom LROC Tile Streaming</p>
        </header>

        <!-- Layer Controls -->
        <div id="layer-controls" class="glass-panel" style="position: absolute; top: 70px; right: 20px; padding: 15px; border-radius: 12px; z-index: 100; min-width: 160px;">
            <div id="layers-header-toggle" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; margin-bottom: 10px;">
                <h3 id="layers-title" style="margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Layers</h3>
                <span id="layers-chevron" style="font-size: 12px; transition: transform 0.3s ease;">▼</span>
            </div>
            <div id="layers-content" style="display: block; overflow: hidden; transition: max-height 0.3s ease;">
                <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
                    <input type="checkbox" class="layer-toggle" data-layer="mission" checked style="margin-right: 10px; accent-color: #FFCC00;"> 
                    <img id="icon-mission" alt="" style="width: 16px; height: 16px; margin-right: 8px; display: block;">
                    <span id="label-mission">Missions</span>
                </label>
                <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
                    <input type="checkbox" class="layer-toggle" data-layer="crater" checked style="margin-right: 10px; accent-color: #FFFFFF;">
                    <img id="icon-crater" alt="" style="width: 16px; height: 16px; margin-right: 8px; display: block;">
                    <span id="label-crater">Craters</span>
                </label>
                <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
                    <input type="checkbox" class="layer-toggle" data-layer="mare" checked style="margin-right: 10px; accent-color: #88CCFF;">
                    <img id="icon-mare" alt="" style="width: 16px; height: 16px; margin-right: 8px; display: block;">
                    <span id="label-mare">Maria</span>
                </label>
                <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
                    <input type="checkbox" class="layer-toggle" data-layer="mountain" checked style="margin-right: 10px; accent-color: #FF7777;">
                    <img id="icon-mountain" alt="" style="width: 16px; height: 16px; margin-right: 8px; display: block;">
                    <span id="label-mountain">Mountains</span>
                </label>
                <label style="display: flex; align-items: center; margin-bottom: 0; cursor: pointer;">
                    <input type="checkbox" class="layer-toggle" data-layer="planned" checked style="margin-right: 10px; accent-color: #00FF00;">
                    <img id="icon-planned" alt="" style="width: 16px; height: 16px; margin-right: 8px; display: block;">
                    <span id="label-planned">Planned</span>
                </label>
                
                <!-- Manual Alignment Offset Panel -->
                <div id="alignment-panel" style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;">
                    <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; color: rgba(255,255,255,0.6); font-weight: 700;">Manual Alignment</div>
                    <div style="margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; color: rgba(255,255,255,0.8);">
                            <span>Lat Offset:</span>
                            <span id="lat-val" style="font-family: monospace; font-weight: 600; color: #FF7777;">0.00&deg;</span>
                        </div>
                        <input type="range" id="lat-offset" min="-90" max="90" step="0.1" value="0" style="width: 100%; accent-color: #FF7777; height: 4px; border-radius: 2px; outline: none; cursor: pointer;">
                    </div>
                    <div style="margin-bottom: 5px;">
                        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; color: rgba(255,255,255,0.8);">
                            <span>Lon Offset:</span>
                            <span id="lon-val" style="font-family: monospace; font-weight: 600; color: #88CCFF;">0.00&deg;</span>
                        </div>
                        <input type="range" id="lon-offset" min="-180" max="180" step="0.1" value="0" style="width: 100%; accent-color: #88CCFF; height: 4px; border-radius: 2px; outline: none; cursor: pointer;">
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar Data Panel -->
        <div id="wiki-sidebar" class="wiki-sidebar glass-panel">
            <button id="close-wiki-btn" class="close-btn" aria-label="Close Panel">&times;</button>
            <div class="wiki-header">
                <img id="wiki-image" src="" alt="Site Image" style="width: 100%; display: none; border-radius: 12px 12px 0 0; object-fit: cover; max-height: 200px;">
                <div id="wiki-image-loader" style="width: 100%; height: 100px; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-radius: 12px 12px 0 0;">
                    <span style="color: rgba(255,255,255,0.6); font-size: 12px;">Loading image...</span>
                </div>
            </div>
            <div class="wiki-content-area" style="padding: 24px;">
                <h2 id="wiki-title" style="margin-top: 0; margin-bottom: 8px; font-size: 24px;">Site Name</h2>
                <div class="site-meta" style="margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(222, 235, 255, 0.1); font-size: 12px; color: #125DFF; font-family: 'Fira Code', monospace;">
                    <span id="wiki-coords">Lat: 0.0&deg;, Lon: 0.0&deg;</span>
                </div>
                <div id="wiki-extract" style="line-height: 1.6; font-size: 14px; margin-bottom: 20px; color: rgba(222, 235, 255, 0.8);">Description goes here.</div>
                <a id="wiki-link" href="#" target="_blank" rel="noopener" class="glass-btn" style="display: none; width: 100%; padding: 10px; border-radius: 8px; text-decoration: none; color: white; background: rgba(0, 122, 255, 0.4); border: 1px solid rgba(0, 122, 255, 0.6); text-align: center; font-weight: bold; transition: all 0.2s ease;">Open in Wikipedia ↗</a>
            </div>
        </div>
        
        <!-- Credits -->
        <div id="credits" class="credits-panel">
            Map Data: <a href="https://www.openplanetary.org/" target="_blank" rel="noopener">OpenPlanetary</a>, NASA LROC, &amp; QuickMap
        </div>
        
        <!-- Scale Ruler -->
        <div id="scale-ruler">
            <div id="scale-text" class="scale-text">100 km</div>
            <div id="scale-bar" class="scale-bar-container"></div>
        </div>
    </div>

    <!-- 3D Cesium Container -->
    <div id="canvas-container"></div>
    
    <!-- Application Logic -->
    <script src="data.js?v=1"></script>
    <script src="app.js?v=9"></script>
</body>
</html>
